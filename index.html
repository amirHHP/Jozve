<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DropIt - Drop Capture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="popup-app dark" id="popup-container">
      
      <!-- VIEW 1: TAGS VIEW (HOME) -->
      <div id="view-tags" class="popup-view active">
        <div class="popup-header">
          <div class="brand-container" style="display: flex; align-items: center; gap: 8px;">
            <svg class="brand-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="28" height="28" fill="none">
              <path d="M50 12 C50 12, 85 45, 85 65 A35 35 0 1 1 15 65 C15 45, 50 12, 50 12 Z" fill="url(#dropGradBrand)" />
              <defs>
                <linearGradient id="dropGradBrand" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#c084fc" />
                  <stop offset="100%" stop-color="#6366f1" />
                </linearGradient>
              </defs>
            </svg>
            <div>
              <h2 style="margin: 0; line-height: 1.1;">DropIt</h2>
              <p id="popup-subtitle" style="margin: 2px 0 0;">Drop Capture</p>
            </div>
          </div>
          <div class="header-actions">
            <button class="lang-btn" id="lang-btn" title="Toggle Language">فارسی</button>
            <button class="icon-btn" id="dashboard-btn" title="Open Dashboard">↗</button>
            <button class="icon-btn" id="settings-btn" title="AI Settings">⚙️</button>
          </div>
        </div>

        <div class="search-container" style="margin-bottom: 12px;">
          <input class="popup-input" style="margin-bottom: 0 !important;" placeholder="Search tags..." id="tag-search" />
        </div>

        <div class="scrollable" style="flex: 1;">
          <div class="tags-grid" id="tags-grid">
            <!-- Dynamically populated tags grid -->
          </div>
          <div class="empty-state" id="tags-empty-state" style="display: none; text-align: center; margin-top: 40px; color: var(--text-muted); padding: 0 10px;">
            <div style="margin-bottom: 16px;">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="48" height="48" fill="none">
                <path d="M50 12 C50 12, 85 45, 85 65 A35 35 0 1 1 15 65 C15 45, 50 12, 50 12 Z" fill="url(#dropGradEmpty)" opacity="0.4" />
                <defs>
                  <linearGradient id="dropGradEmpty" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#c084fc" />
                    <stop offset="100%" stop-color="#6366f1" />
                  </linearGradient>
                </defs>
              </svg>
            </div>
            <p id="tags-empty-text">Right-click web selections to automatically capture and tag notes.</p>
          </div>
        </div>

        <div class="popup-actions-footer">
          <button class="popup-primary" id="add-note-btn">＋ New Note</button>
        </div>
      </div>

      <!-- VIEW 2: NOTES VIEW (TAG NOTES) -->
      <div id="view-notes" class="popup-view">
        <div class="popup-header">
          <div class="header-back-title">
            <button class="back-btn" id="notes-back-btn">←</button>
            <div>
              <h2 id="active-tag-title"># Tag Name</h2>
              <p id="active-tag-count">0 notes</p>
            </div>
          </div>
        </div>

        <div class="scrollable" style="flex: 1;">
          <div class="popup-notes-list" id="notes-list">
            <!-- Dynamically populated notes list -->
          </div>
        </div>
      </div>

      <!-- VIEW 3: SETTINGS VIEW -->
      <div id="view-settings" class="popup-view">
        <div class="popup-header">
          <div class="header-back-title">
            <button class="back-btn" id="settings-back-btn">←</button>
            <div>
              <h2 id="settings-title">AI Settings</h2>
              <p id="settings-subtitle">Gemini API Configuration</p>
            </div>
          </div>
        </div>

        <div class="scrollable settings-form" style="flex: 1;">
          <div class="form-group">
            <label for="api-key-input" id="lbl-api-key">Gemini API Key</label>
            <div class="input-with-action">
              <input type="password" class="popup-input" id="api-key-input" placeholder="AIzaSy..." />
              <button class="input-toggle-btn" id="toggle-key-visibility">👁️</button>
            </div>
            <a href="https://aistudio.google.com/" target="_blank" class="helper-link" id="link-get-key">Get a free key from Google AI Studio</a>
          </div>

          <div class="form-group">
            <label for="model-select" id="lbl-model">Gemini Model</label>
            <select class="popup-select" id="model-select">
              <option value="gemini-2.5-flash">Gemini 2.5 Flash (Recommended)</option>
              <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
              <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
              <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
            </select>
          </div>

          <div class="form-group" style="margin-top: 10px;">
            <button class="popup-secondary" style="width: 100%;" id="test-conn-btn">Test Connection</button>
            <div class="status-msg" id="test-status"></div>
          </div>
        </div>

        <div class="popup-actions-footer">
          <button class="popup-primary" id="save-settings-btn" style="width: 100%;">Save Settings</button>
        </div>
      </div>

      <!-- VIEW 4: ADD NOTE VIEW (MANUAL CAPTURE) -->
      <div id="view-add-note" class="popup-view">
        <div class="popup-header">
          <div class="header-back-title">
            <button class="back-btn" id="add-note-back-btn">←</button>
            <div>
              <h2 id="add-note-title">New Note</h2>
              <p id="add-note-subtitle">Manual entry with AI auto-tagging</p>
            </div>
          </div>
        </div>

        <div class="scrollable" style="flex: 1; display: flex; flex-direction: column; gap: 12px;">
          <textarea class="popup-textarea" id="manual-note-text" style="flex: 1; min-height: 150px;" placeholder="Write or paste your content here..."></textarea>
          <input type="text" class="popup-input" id="manual-note-source" style="margin-bottom: 0 !important;" placeholder="Source title or link (optional)" />
        </div>

        <div class="popup-actions-footer">
          <button class="popup-primary" id="save-manual-note-btn" style="width: 100%;">Save & Tag Note</button>
        </div>
      </div>

      <div class="toast" id="toast" style="display: none;">Saved ✓</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
